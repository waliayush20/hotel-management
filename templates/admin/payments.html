{% extends "base.html" %}

{% block content %}

<h2>Payment Records</h2>

<table class="table">

<tr>
    <th>ID</th>
    <th>Amount</th>
    <th>Method</th>
    <th>Status</th>
    <th>Transaction ID</th>
</tr>

{% for payment in payments %}

<tr>
<td>{{ payment.id }}</td>
<td>{{ payment.amount }}</td>
<td>{{ payment.payment_method }}</td>
<td>{{ payment.status }}</td>
<td>{{ payment.transaction_id }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
