{% extends "base.html" %}

{% block content %}

<h2>Book Room {{ room.room_number }}</h2>

<p>Type: {{ room.room_type }}</p>
<p>Price per day: {{ room.price }}</p>
<p>Status: {{ room.status }}</p>

<form method="POST">

<label>Days</label>
<input type="number" name="days" class="form-control" value="1" min="1" required>

<br>

<button class="btn btn-primary">
Confirm Booking
</button>

</form>

{% endblock %}
