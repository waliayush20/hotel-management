{% extends "base.html" %}

{% block content %}

<h2>Room Details: {{ room.room_number }}</h2>

<p><strong>Type:</strong> {{ room.room_type }}</p>
<p><strong>Price:</strong> {{ room.price }}</p>
<p><strong>Status:</strong> {{ room.status }}</p>
<p><strong>Description:</strong> {{ room.description or 'No description' }}</p>

<a href="{{ url_for('customer_book', id=room.id) }}" class="btn btn-success">Book this Room</a>

{% endblock %}
