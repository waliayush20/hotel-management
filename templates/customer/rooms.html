{% extends "base.html" %}

{% block content %}

<h2>Available Rooms</h2>

<table class="table">

<tr>
    <th>ID</th>
    <th>Type</th>
    <th>Price</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for room in rooms %}

<tr>

<td>{{ room.id }}</td>
<td>{{ room.room_type }}</td>
<td>{{ room.price }}</td>
<td>{{ room.status }}</td>

<td>
<a href="{{ url_for('customer_room_detail', id=room.id) }}" class="btn btn-info">Details</a>
<a href="{{ url_for('customer_book', id=room.id) }}" class="btn btn-success">Book</a>
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
